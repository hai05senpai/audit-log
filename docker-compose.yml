version: '3.8'

services:
  # 1. Zookeeper: Trình quản lý điều phối cho Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: auditlog-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - auditlog-network

  # 2. Apache Kafka: Message Broker (Bộ đệm pipeline)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: auditlog-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - auditlog-network

  # 3. Elasticsearch: Kho lưu trữ và tìm kiếm log tập trung (Full-text search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: auditlog-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt security để tiện dev/demo, không cần cấu hình TLS/Password phức tạp
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Giới hạn RAM tối đa 512MB để không bị nặng máy khi chạy demo
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - auditlog-network

volumes:
  es-data:
    driver: local

networks:
  auditlog-network:
    driver: bridge